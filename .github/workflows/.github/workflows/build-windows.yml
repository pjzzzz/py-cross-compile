name: Build Windows Binaries

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        arch: ['x86', 'x64']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name py-cross-compile main.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-binary-py${{ matrix.python-version }}-${{ matrix.arch }}
          path: dist/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/py-cross-compile.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-cross-compile:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'cross-compile')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build Windows binary (cross-compile from Linux)
        run: |
          mkdir -p build_windows
          cd build_windows
          pyinstaller --onefile --windowed --name py-cross-compile ../main.py
      
      - name: Upload cross-compiled artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-cross-compiled-binary
          path: build_windows/dist/
          retention-days: 30
