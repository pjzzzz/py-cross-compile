name: Build Windows Binaries

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-codec2-windows:
    name: Cross-Compile codec2 for Windows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codec2
        uses: actions/checkout@v4
        with:
          repository: aarmono/codec2
          path: codec2
      
      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake build-essential
      
      - name: Create build directory
        run: mkdir -p codec2/build_windows
      
      - name: Configure CMake for Windows cross-compilation
        run: |
          cd codec2/build_windows
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DUNITTEST=FALSE
      
      - name: Build codec2
        run: |
          cd codec2/build_windows
          make -j$(nproc)
      
      - name: Upload codec2 Windows DLL
        uses: actions/upload-artifact@v3
        with:
          name: codec2-windows-dll
          path: codec2/build_windows/src/*.dll
          retention-days: 30

  build-windows-pyinstaller:
    name: PyInstaller Build (Windows)
    runs-on: windows-latest
    needs: build-codec2-windows
    strategy:
      matrix:
        python-version: ['3.13']
        arch: ['x64']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download codec2 DLL
        uses: actions/download-artifact@v3
        with:
          name: codec2-windows-dll
          path: dlls/
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Build Windows executable with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name pdf-converter --add-data "dlls:dlls" src/pdf_converter/app.py
      
      - name: Upload PyInstaller artifacts
        uses: actions/upload-artifact@v3
        with:
          name: pyinstaller-windows-py${{ matrix.python-version }}-${{ matrix.arch }}
          path: dist/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/pdf-converter.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Build macOS executable
        run: |
          pyinstaller --onefile --name pdf-converter src/pdf_converter/app.py
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-binary-py${{ matrix.python-version }}
          path: dist/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/pdf-converter
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name pdf-converter src/pdf_converter/app.py
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-binary-py${{ matrix.python-version }}
          path: dist/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/pdf-converter
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
